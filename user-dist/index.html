<!doctype html>
<html lang="en">
  <head>
    <script>
      ;(() => {
        const storageKey = "vite-ui-theme"
        const root = document.documentElement
        const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)")
        const mobileUA = /Mobile|Android|iPhone|iPod|IEMobile|BlackBerry|Opera Mini|Windows Phone/i.test(navigator.userAgent)
        root.classList.toggle("geoip-mobile-ua", mobileUA)
        window.GeoIPMobileUA = mobileUA

        const resolveTheme = (theme) =>
          theme === "system" ? (mediaQuery.matches ? "dark" : "light") : theme

        function updateThemeColor(nextTheme) {
          const themeColor = nextTheme === "dark" ? "hsl(30 15% 8%)" : "hsl(0 0% 98%)"
          let meta = document.querySelector('meta[name="theme-color"]')

          if (!meta) {
            meta = document.createElement("meta")
            meta.setAttribute("name", "theme-color")
            document.head.appendChild(meta)
          }

          meta.setAttribute("content", themeColor)
        }

        function applyResolvedTheme(resolvedTheme) {
          root.classList.remove("light", "dark")
          root.classList.add(resolvedTheme)
          root.style.colorScheme = resolvedTheme
          root.style.backgroundColor =
            resolvedTheme === "dark" ? "hsl(30 15% 8%)" : "hsl(0 0% 98%)"
          updateThemeColor(resolvedTheme)
        }

        let theme = "system"

        try {
          const storedTheme = localStorage.getItem(storageKey)
          if (storedTheme === "light" || storedTheme === "dark" || storedTheme === "system") {
            theme = storedTheme
          }
        } catch (_e) {
          theme = "system"
        }

        applyResolvedTheme(resolveTheme(theme))

        // Add loaded class after React has mounted
        window.addEventListener("load", () => {
          const root = document.getElementById("root")
          if (root) {
            // 使用 RAF 确保在下一帧渲染
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                root.classList.add("loaded")
              })
            })
          }
        })
      })()
    </script>
